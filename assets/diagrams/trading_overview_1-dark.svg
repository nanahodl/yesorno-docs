  <text x="180" y="277" text-anchor="middle" font-size="13" fill="#C4B5FD">Last trade <tspan font-weight="700" fill="#DDD6FE">0.61</tspan></text>
  <text x="460" y="277" text-anchor="middle" font-size="13" font-weight="700" fill="#DDD6FE">Spread 0.02</text>
