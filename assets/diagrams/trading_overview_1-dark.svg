<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 380" width="920" style="max-width: 920px; background: transparent; font-family: -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;">
