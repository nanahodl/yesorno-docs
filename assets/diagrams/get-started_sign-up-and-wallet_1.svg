<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 260" width="1000" style="max-width: 1000px; background: transparent; font-family: -apple-system, Segoe UI, Roboto, Helvetica Neue, Arial, sans-serif;">
  <rect data-bg="white" x="0.0" y="0.0" width="1080.0" height="260.0" fill="#FFFFFF" rx="8" ry="8"/>
  <defs>
    <marker id="arr-su" viewBox="0 0 10 10" refX="9" refY="5" markerUnits="strokeWidth" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#4C1D95"/>
    </marker>
  </defs>

  <!-- Step 1: Top bar -->
  <rect x="20" y="108" width="90" height="44" rx="6" fill="#F5F3FF" stroke="#4C1D95" stroke-width="1.5"/>
  <text x="65" y="135" text-anchor="middle" font-size="13" font-weight="700" fill="#4C1D95">Top bar</text>

  <!-- arrow -->
  <line x1="112" y1="130" x2="138" y2="130" stroke="#4C1D95" stroke-width="1.8" marker-end="url(#arr-su)"/>

  <!-- Step 2: Modal -->
  <rect x="140" y="100" width="150" height="60" rx="6" fill="#F5F3FF" stroke="#4C1D95" stroke-width="1.5"/>
  <text x="215" y="125" text-anchor="middle" font-size="13" font-weight="700" fill="#4C1D95">Log In /</text>
  <text x="215" y="143" text-anchor="middle" font-size="13" font-weight="700" fill="#4C1D95">Sign Up modal</text>

  <!-- arrow -->
  <line x1="292" y1="130" x2="378" y2="130" stroke="#4C1D95" stroke-width="1.8" marker-end="url(#arr-su)"/>

  <!-- Step 3: Choose method (diamond) -->
  <polygon points="380,130 450,80 520,130 450,180" fill="#DDD6FE" stroke="#4C1D95" stroke-width="1.8"/>
  <text x="450" y="127" text-anchor="middle" font-size="13" font-weight="700" fill="#4C1D95">Choose</text>
  <text x="450" y="144" text-anchor="middle" font-size="13" font-weight="700" fill="#4C1D95">method</text>

  <!-- Diamond -> wallet (top) -->
  <path d="M 485 102 C 525 80, 540 54, 558 54" fill="none" stroke="#4C1D95" stroke-width="1.8" marker-end="url(#arr-su)"/>

  <!-- Diamond -> email (bottom) -->
  <path d="M 485 158 C 525 180, 540 206, 558 206" fill="none" stroke="#4C1D95" stroke-width="1.8" marker-end="url(#arr-su)"/>

  <!-- Top branch: Wallet -->
  <rect x="560" y="20" width="170" height="68" rx="6" fill="#F5F3FF" stroke="#4C1D95" stroke-width="1.5"/>
  <text x="645" y="44" text-anchor="middle" font-size="13" font-weight="700" fill="#4C1D95">Connect wallet</text>
  <text x="645" y="62" text-anchor="middle" font-size="13" fill="#4C1D95" opacity="0.75">MetaMask · Coinbase Wallet</text>
  <text x="645" y="78" text-anchor="middle" font-size="13" fill="#4C1D95" opacity="0.75">Phantom · Uniswap</text>

  <!-- arrow -->
  <line x1="732" y1="54" x2="768" y2="54" stroke="#4C1D95" stroke-width="1.8" marker-end="url(#arr-su)"/>

  <rect x="770" y="32" width="140" height="44" rx="6" fill="#F5F3FF" stroke="#4C1D95" stroke-width="1.5"/>
  <text x="840" y="59" text-anchor="middle" font-size="13" font-weight="700" fill="#4C1D95">Sign to connect</text>

  <!-- Bottom branch: Email -->
  <rect x="560" y="172" width="170" height="60" rx="6" fill="#F5F3FF" stroke="#4C1D95" stroke-width="1.5"/>
  <text x="645" y="196" text-anchor="middle" font-size="13" font-weight="700" fill="#4C1D95">Email + Privy</text>
  <text x="645" y="216" text-anchor="middle" font-size="13" fill="#4C1D95" opacity="0.75">embedded wallet</text>

  <!-- arrow -->
  <line x1="732" y1="206" x2="768" y2="206" stroke="#4C1D95" stroke-width="1.8" marker-end="url(#arr-su)"/>

  <rect x="770" y="184" width="140" height="44" rx="6" fill="#F5F3FF" stroke="#4C1D95" stroke-width="1.5"/>
  <text x="840" y="211" text-anchor="middle" font-size="13" font-weight="700" fill="#4C1D95">Email OTP</text>

  <!-- sign -> account ready -->
  <path d="M 912 54 C 930 54, 935 100, 948 122" fill="none" stroke="#4C1D95" stroke-width="1.8" marker-end="url(#arr-su)"/>
  <!-- otp -> account ready -->
  <path d="M 912 206 C 930 206, 935 160, 948 138" fill="none" stroke="#4C1D95" stroke-width="1.8" marker-end="url(#arr-su)"/>

  <!-- Final: Account ready -->
  <rect x="950" y="108" width="120" height="44" rx="6" fill="#DDD6FE" stroke="#4C1D95" stroke-width="1.8"/>
  <text x="1010" y="135" text-anchor="middle" font-size="13" font-weight="700" fill="#4C1D95">Account ready</text>
</svg>
