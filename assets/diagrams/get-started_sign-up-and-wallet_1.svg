<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 260" width="1000" style="max-width: 1000px; background: transparent; font-family: -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;">
  <defs>
    <marker id="arr-su" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#4C1D95"/>
    </marker>
  </defs>
  <style>
    .node { fill: #F5F3FF; stroke: #4C1D95; stroke-width: 1.5; }
    .node-accent { fill: #DDD6FE; stroke: #4C1D95; stroke-width: 1.8; }
    .t  { font-size: 13px; fill: #4C1D95; text-anchor: middle; }
    .tb { font-size: 13px; fill: #4C1D95; text-anchor: middle; font-weight: 700; }
    .flow { stroke: #4C1D95; stroke-width: 1.8; fill: none; }
  </style>

  <!-- Step 1: Top bar -->
  <rect class="node" x="20" y="108" width="90" height="44" rx="6"/>
  <text class="tb" x="65" y="135">Top bar</text>

  <!-- Step 2: Modal -->
  <rect class="node" x="140" y="100" width="150" height="60" rx="6"/>
  <text class="tb" x="215" y="125">Log In /</text>
  <text class="tb" x="215" y="143">Sign Up modal</text>

  <!-- Step 3: Choose method (diamond) -->
  <polygon class="node-accent" points="380,130 450,80 520,130 450,180"/>
  <text class="tb" x="450" y="127">Choose</text>
  <text class="tb" x="450" y="144">method</text>

  <!-- Top branch: Wallet -->
  <rect class="node" x="560" y="20" width="170" height="68" rx="6"/>
  <text class="tb" x="645" y="44">Connect wallet</text>
  <text class="t"  x="645" y="62" opacity="0.75">MetaMask · Coinbase</text>
  <text class="t"  x="645" y="78" opacity="0.75">Phantom · Uniswap</text>

  <rect class="node" x="770" y="32" width="140" height="44" rx="6"/>
  <text class="tb" x="840" y="59">Sign to connect</text>

  <!-- Bottom branch: Email -->
  <rect class="node" x="560" y="172" width="170" height="68" rx="6"/>
  <text class="tb" x="645" y="196">Email + Privy</text>
  <text class="t"  x="645" y="216" opacity="0.75">embedded wallet</text>
  <text class="t"  x="645" y="232" opacity="0.75">&nbsp;</text>

  <rect class="node" x="770" y="184" width="140" height="44" rx="6"/>
  <text class="tb" x="840" y="211">Email OTP</text>

  <!-- Final: Account ready -->
  <rect class="node-accent" x="950" y="108" width="120" height="44" rx="6"/>
  <text class="tb" x="1010" y="135">Account ready</text>

  <!-- Flows -->
  <line class="flow" x1="112" y1="130" x2="138" y2="130" marker-end="url(#arr-su)"/>
  <line class="flow" x1="292" y1="130" x2="378" y2="130" marker-end="url(#arr-su)"/>

  <!-- Diamond -> wallet -->
  <path class="flow" d="M 485 102 C 525 80, 540 54, 558 54" marker-end="url(#arr-su)"/>
  <!-- Diamond -> email -->
  <path class="flow" d="M 485 158 C 525 180, 540 206, 558 206" marker-end="url(#arr-su)"/>

  <!-- Wallet -> sign -->
  <line class="flow" x1="732" y1="54" x2="768" y2="54" marker-end="url(#arr-su)"/>
  <!-- Email -> otp -->
  <line class="flow" x1="732" y1="206" x2="768" y2="206" marker-end="url(#arr-su)"/>

  <!-- sign -> account ready -->
  <path class="flow" d="M 912 54 C 930 54, 935 100, 948 122" marker-end="url(#arr-su)"/>
  <!-- otp -> account ready -->
  <path class="flow" d="M 912 206 C 930 206, 935 160, 948 138" marker-end="url(#arr-su)"/>
</svg>
