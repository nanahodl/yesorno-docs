<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 200" width="820" style="max-width: 820px; background: transparent; font-family: -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;">
  <rect data-bg="dark" x="0" y="0" width="820" height="200" fill="#1A1230" rx="8" ry="8"/>

  <defs>
    <linearGradient id="probGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#3D2A6A"/>
      <stop offset="25%"  stop-color="#7C3AED"/>
      <stop offset="50%"  stop-color="#A78BFA"/>
      <stop offset="75%"  stop-color="#C4B5FD"/>
      <stop offset="100%" stop-color="#DDD6FE"/>
    </linearGradient>
  </defs>

  <!-- Continuous gradient bar across the top, suggesting a probability axis -->
  <rect x="20" y="20" width="780" height="10" rx="5" ry="5" fill="url(#probGrad)"/>

  <!-- 5 cards anchored under the bar -->
  <!-- Card 1: 1¢  (center x = 88) -->
  <rect x="20"  y="48" width="136" height="116" rx="8" ry="8"
        fill="#1A1230" stroke="#7C3AED" stroke-width="1"/>
  <text x="88"  y="82"  text-anchor="middle" font-size="22" font-weight="700" fill="#DDD6FE">1¢</text>
  <text x="88"  y="110" text-anchor="middle" font-size="12" fill="#C4B5FD">~1% chance</text>
  <text x="88"  y="140" text-anchor="middle" font-size="13" font-weight="600" fill="#C4B5FD">Almost impossible</text>

  <!-- Card 2: 25¢ (center x = 244) -->
  <rect x="176" y="48" width="136" height="116" rx="8" ry="8"
        fill="#1A1230" stroke="#7C3AED" stroke-width="1"/>
  <text x="244" y="82"  text-anchor="middle" font-size="22" font-weight="700" fill="#DDD6FE">25¢</text>
  <text x="244" y="110" text-anchor="middle" font-size="12" fill="#C4B5FD">~25% chance</text>
  <text x="244" y="140" text-anchor="middle" font-size="13" font-weight="600" fill="#C4B5FD">Unlikely</text>

  <!-- Card 3: 50¢ (emphasized) (center x = 410) -->
  <rect x="332" y="44" width="156" height="124" rx="10" ry="10"
        fill="#2D2150" stroke="#A78BFA" stroke-width="1.8"/>
  <text x="410" y="82"  text-anchor="middle" font-size="24" font-weight="700" fill="#DDD6FE">50¢</text>
  <text x="410" y="110" text-anchor="middle" font-size="12" fill="#C4B5FD">~50% chance</text>
  <text x="410" y="140" text-anchor="middle" font-size="13" font-weight="700" fill="#DDD6FE">Coin flip</text>

  <!-- Card 4: 75¢ (center x = 576) -->
  <rect x="508" y="48" width="136" height="116" rx="8" ry="8"
        fill="#1A1230" stroke="#7C3AED" stroke-width="1"/>
  <text x="576" y="82"  text-anchor="middle" font-size="22" font-weight="700" fill="#DDD6FE">75¢</text>
  <text x="576" y="110" text-anchor="middle" font-size="12" fill="#C4B5FD">~75% chance</text>
  <text x="576" y="140" text-anchor="middle" font-size="13" font-weight="600" fill="#C4B5FD">Likely</text>

  <!-- Card 5: 99¢ (center x = 732) -->
  <rect x="664" y="48" width="136" height="116" rx="8" ry="8"
        fill="#1A1230" stroke="#7C3AED" stroke-width="1"/>
  <text x="732" y="82"  text-anchor="middle" font-size="22" font-weight="700" fill="#DDD6FE">99¢</text>
  <text x="732" y="110" text-anchor="middle" font-size="12" fill="#C4B5FD">~99% chance</text>
  <text x="732" y="140" text-anchor="middle" font-size="13" font-weight="600" fill="#C4B5FD">Almost certain</text>

  <!-- Caption -->
  <text x="410" y="190" text-anchor="middle" font-size="13" fill="#C4B5FD" font-weight="500">Share price = the market's implied probability</text>
</svg>
