<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 260" width="820" style="max-width: 820px; background: transparent; font-family: -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;">
  <rect data-bg="white" x="0" y="0" width="820" height="260" fill="#FFFFFF" rx="8" ry="8"/>

  <defs>
    <marker id="arr-ref-solid" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7C3AED"/>
    </marker>
    <marker id="arr-ref-dim" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#A78BFA"/>
    </marker>
  </defs>

  <!-- ===== Connector lines first so circles overlay them ===== -->
  <!-- YOU -> L1 (solid) -->
  <line x1="190" y1="130" x2="380" y2="130" stroke="#7C3AED" stroke-width="2.5" marker-end="url(#arr-ref-solid)"/>
  <!-- L1 -> L2 (dashed lighter) -->
  <line x1="500" y1="130" x2="690" y2="130" stroke="#A78BFA" stroke-width="2.5" stroke-dasharray="6 5" marker-end="url(#arr-ref-dim)"/>

  <!-- ===== Reward badges floating above arrows ===== -->
  <!-- 30% above first arrow -->
  <g>
    <rect x="245" y="78" width="80" height="34" rx="17" fill="#4C1D95"/>
    <text x="285" y="101" text-anchor="middle" font-size="17" fill="#FFFFFF" font-weight="700">30%</text>
  </g>
  <text x="285" y="158" text-anchor="middle" font-size="12" fill="#5B21B6" font-weight="500">of their fees</text>

  <!-- 10% above second arrow -->
  <g>
    <rect x="555" y="84" width="80" height="28" rx="14" fill="#FFFFFF" stroke="#7C3AED" stroke-width="1.5"/>
    <text x="595" y="104" text-anchor="middle" font-size="15" fill="#5B21B6" font-weight="700">10%</text>
  </g>
  <text x="595" y="158" text-anchor="middle" font-size="12" fill="#5B21B6" font-weight="500">of their fees</text>

  <!-- ===== Node 1: YOU ===== -->
  <circle cx="120" cy="130" r="58" fill="#4C1D95"/>
  <text x="120" y="124" text-anchor="middle" font-size="13" fill="#C4B5FD" font-weight="500">YOU</text>
  <text x="120" y="146" text-anchor="middle" font-size="15" fill="#FFFFFF" font-weight="700">earn</text>

  <!-- ===== Node 2: L1 ===== -->
  <circle cx="440" cy="130" r="58" fill="#FFFFFF" stroke="#7C3AED" stroke-width="2.5"/>
  <text x="440" y="124" text-anchor="middle" font-size="11" fill="#7C3AED" font-weight="600">DIRECT (L1)</text>
  <text x="440" y="146" text-anchor="middle" font-size="14" fill="#4C1D95" font-weight="700">your friend</text>

  <!-- ===== Node 3: L2 ===== -->
  <circle cx="750" cy="130" r="58" fill="#FFFFFF" stroke="#A78BFA" stroke-width="2"/>
  <text x="750" y="124" text-anchor="middle" font-size="11" fill="#7C3AED" font-weight="600">INDIRECT (L2)</text>
  <text x="750" y="146" text-anchor="middle" font-size="14" fill="#5B21B6" font-weight="700">their friend</text>

  <!-- ===== Caption ===== -->
  <text x="410" y="220" text-anchor="middle" font-size="14" fill="#4C1D95" font-weight="600">Two levels deep, settled automatically in USDC.</text>
</svg>
