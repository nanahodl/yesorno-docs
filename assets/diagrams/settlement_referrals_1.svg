<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 360" width="820" style="max-width: 820px; background: transparent; font-family: -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;">
  <rect data-bg="white" x="0" y="0" width="820" height="360" fill="#FFFFFF" rx="8" ry="8"/>

  <defs>
    <marker id="arr-ref" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7C3AED"/>
    </marker>
  </defs>

  <!-- ===== YOU (root) ===== -->
  <rect x="340" y="30" width="140" height="56" rx="10" ry="10"
        fill="#4C1D95" stroke="#4C1D95" stroke-width="1.5"/>
  <text x="410" y="55" text-anchor="middle" font-size="13" fill="#EDE9FE" font-weight="500">YOU</text>
  <text x="410" y="74" text-anchor="middle" font-size="13" fill="#FFFFFF" font-weight="700">earn rewards</text>

  <!-- ===== Branch labels (L1 30%) ===== -->
  <!-- left arrow -->
  <path d="M 380 86 C 320 110, 240 130, 195 148" fill="none" stroke="#7C3AED" stroke-width="1.8" marker-end="url(#arr-ref)"/>
  <!-- right arrow -->
  <path d="M 440 86 C 500 110, 580 130, 625 148" fill="none" stroke="#7C3AED" stroke-width="1.8" marker-end="url(#arr-ref)"/>

  <!-- L1 percent badge - left -->
  <rect x="248" y="100" width="60" height="22" rx="11" fill="#EDE9FE" stroke="#7C3AED" stroke-width="1"/>
  <text x="278" y="115" text-anchor="middle" font-size="12" fill="#4C1D95" font-weight="700">+30%</text>
  <!-- L1 percent badge - right -->
  <rect x="512" y="100" width="60" height="22" rx="11" fill="#EDE9FE" stroke="#7C3AED" stroke-width="1"/>
  <text x="542" y="115" text-anchor="middle" font-size="12" fill="#4C1D95" font-weight="700">+30%</text>

  <!-- ===== L1 Direct referrals (left, right) ===== -->
  <!-- Left L1 -->
  <rect x="120" y="150" width="150" height="60" rx="8" ry="8"
        fill="#F5F3FF" stroke="#7C3AED" stroke-width="1.5"/>
  <text x="195" y="174" text-anchor="middle" font-size="12" fill="#7C3AED" font-weight="600">Direct (L1)</text>
  <text x="195" y="194" text-anchor="middle" font-size="13" fill="#4C1D95" font-weight="700">Friend A</text>

  <!-- Right L1 -->
  <rect x="550" y="150" width="150" height="60" rx="8" ry="8"
        fill="#F5F3FF" stroke="#7C3AED" stroke-width="1.5"/>
  <text x="625" y="174" text-anchor="middle" font-size="12" fill="#7C3AED" font-weight="600">Direct (L1)</text>
  <text x="625" y="194" text-anchor="middle" font-size="13" fill="#4C1D95" font-weight="700">Friend B</text>

  <!-- ===== L1 -> L2 arrows + 10% badges ===== -->
  <path d="M 195 210 C 195 240, 145 250, 115 268" fill="none" stroke="#A78BFA" stroke-width="1.6" marker-end="url(#arr-ref)"/>
  <path d="M 195 210 C 195 240, 245 250, 275 268" fill="none" stroke="#A78BFA" stroke-width="1.6" marker-end="url(#arr-ref)"/>

  <path d="M 625 210 C 625 240, 575 250, 545 268" fill="none" stroke="#A78BFA" stroke-width="1.6" marker-end="url(#arr-ref)"/>
  <path d="M 625 210 C 625 240, 675 250, 705 268" fill="none" stroke="#A78BFA" stroke-width="1.6" marker-end="url(#arr-ref)"/>

  <!-- L2 percent badges -->
  <rect x="172" y="226" width="46" height="20" rx="10" fill="#FFFFFF" stroke="#A78BFA" stroke-width="1"/>
  <text x="195" y="240" text-anchor="middle" font-size="11" fill="#5B21B6" font-weight="700">+10%</text>

  <rect x="602" y="226" width="46" height="20" rx="10" fill="#FFFFFF" stroke="#A78BFA" stroke-width="1"/>
  <text x="625" y="240" text-anchor="middle" font-size="11" fill="#5B21B6" font-weight="700">+10%</text>

  <!-- ===== L2 nodes ===== -->
  <rect x="55"  y="270" width="120" height="52" rx="8" fill="#FFFFFF" stroke="#A78BFA" stroke-width="1.2"/>
  <text x="115" y="290" text-anchor="middle" font-size="11" fill="#7C3AED" font-weight="600">Indirect (L2)</text>
  <text x="115" y="308" text-anchor="middle" font-size="12" fill="#5B21B6" font-weight="700">A's invitee</text>

  <rect x="215" y="270" width="120" height="52" rx="8" fill="#FFFFFF" stroke="#A78BFA" stroke-width="1.2"/>
  <text x="275" y="290" text-anchor="middle" font-size="11" fill="#7C3AED" font-weight="600">Indirect (L2)</text>
  <text x="275" y="308" text-anchor="middle" font-size="12" fill="#5B21B6" font-weight="700">A's invitee</text>

  <rect x="485" y="270" width="120" height="52" rx="8" fill="#FFFFFF" stroke="#A78BFA" stroke-width="1.2"/>
  <text x="545" y="290" text-anchor="middle" font-size="11" fill="#7C3AED" font-weight="600">Indirect (L2)</text>
  <text x="545" y="308" text-anchor="middle" font-size="12" fill="#5B21B6" font-weight="700">B's invitee</text>

  <rect x="645" y="270" width="120" height="52" rx="8" fill="#FFFFFF" stroke="#A78BFA" stroke-width="1.2"/>
  <text x="705" y="290" text-anchor="middle" font-size="11" fill="#7C3AED" font-weight="600">Indirect (L2)</text>
  <text x="705" y="308" text-anchor="middle" font-size="12" fill="#5B21B6" font-weight="700">B's invitee</text>

  <!-- ===== Caption ===== -->
  <text x="410" y="350" text-anchor="middle" font-size="13" fill="#5B21B6" font-weight="500">You earn 30% of fees from direct invitees, and 10% from their invitees, automatically.</text>
</svg>
