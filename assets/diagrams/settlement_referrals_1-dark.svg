<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 360" width="720" style="max-width: 720px; background: transparent; font-family: -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;">
  <rect data-bg="dark" x="0" y="0" width="720" height="360" fill="#1A1230" rx="8" ry="8"/>

  <defs>
    <linearGradient id="youGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"  stop-color="#A78BFA"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
  </defs>

  <!-- ============================================================
       Layout (vertical chain, all circles r=40, single column at x=110)
         Row 1  YOU   center (110, 70)
         Row 2  Alice center (110, 188)
         Row 3  Carol center (110, 306)
         Pills at x=170..256
         Narrative left-aligned at x=290
  ============================================================ -->

  <!-- ===== ROW 1 : YOU ===== -->
  <circle cx="110" cy="70" r="40" fill="url(#youGrad)"/>
  <text x="110" y="65" text-anchor="middle" font-size="11" fill="#E9D5FF" font-weight="700" letter-spacing="1.2">YOU</text>
  <text x="110" y="83" text-anchor="middle" font-size="13" fill="#FFFFFF" font-weight="700">earn</text>

  <!-- Connector YOU -> Alice -->
  <line x1="110" y1="110" x2="110" y2="148" stroke="#A78BFA" stroke-width="2.5"/>

  <!-- 30% pill (filled) — sits on the connector midpoint -->
  <rect x="170" y="115" width="86" height="28" rx="14" fill="#7C3AED"/>
  <text x="213" y="134" text-anchor="middle" font-size="14" fill="#FFFFFF" font-weight="700">+30%</text>

  <!-- Narrative for Alice (left-aligned, vertically centered around y=129) -->
  <text x="290" y="118" font-size="15" fill="#DDD6FE" font-weight="700">You invite Alice.</text>
  <text x="290" y="138" font-size="13" fill="#C4B5FD" font-weight="500">Every time she trades, you earn</text>
  <text x="290" y="156" font-size="13" fill="#C4B5FD" font-weight="500"><tspan font-weight="700" fill="#DDD6FE">30%</tspan> of the fees she pays.</text>

  <!-- ===== ROW 2 : Alice (Direct, L1) ===== -->
  <circle cx="110" cy="188" r="40" fill="#2D2150" stroke="#A78BFA" stroke-width="2"/>
  <text x="110" y="183" text-anchor="middle" font-size="10" fill="#C4B5FD" font-weight="700" letter-spacing="0.5">DIRECT (L1)</text>
  <text x="110" y="201" text-anchor="middle" font-size="13" fill="#DDD6FE" font-weight="700">Alice</text>

  <!-- Connector Alice -> Carol (dashed = indirect chain) -->
  <line x1="110" y1="228" x2="110" y2="266" stroke="#A78BFA" stroke-width="2" stroke-dasharray="5 4" opacity="0.7"/>

  <!-- 10% pill (outlined) — on the dashed connector midpoint -->
  <rect x="170" y="233" width="86" height="24" rx="12" fill="#1A1230" stroke="#A78BFA" stroke-width="1.5"/>
  <text x="213" y="250" text-anchor="middle" font-size="13" fill="#DDD6FE" font-weight="700">+10%</text>

  <!-- Narrative for Carol (left-aligned, around y=246) -->
  <text x="290" y="237" font-size="15" fill="#DDD6FE" font-weight="700">Alice invites Carol.</text>
  <text x="290" y="259" font-size="13" fill="#C4B5FD" font-weight="500"><tspan font-weight="700" fill="#DDD6FE">10%</tspan> of Carol's fees come to you, too.</text>

  <!-- ===== ROW 3 : Carol (Indirect, L2) ===== -->
  <circle cx="110" cy="306" r="40" fill="#2D2150" stroke="#A78BFA" stroke-width="1.5" stroke-dasharray="3 3"/>
  <text x="110" y="301" text-anchor="middle" font-size="10" fill="#C4B5FD" font-weight="700" letter-spacing="0.5">INDIRECT (L2)</text>
  <text x="110" y="319" text-anchor="middle" font-size="13" fill="#DDD6FE" font-weight="700">Carol</text>
</svg>
