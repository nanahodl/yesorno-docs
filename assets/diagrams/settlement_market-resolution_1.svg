<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 220" width="880" style="max-width: 880px; background: transparent; font-family: -apple-system, Segoe UI, Roboto, Helvetica Neue, Arial, sans-serif;">
  <defs>
    <marker id="arr-lc" viewBox="0 0 10 10" refX="9" refY="5" markerUnits="strokeWidth" markerWidth="9" markerHeight="9" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#4C1D95"/>
    </marker>
  </defs>

  <!-- Timeline spine -->
  <line x1="60" y1="110" x2="820" y2="110" stroke="#4C1D95" stroke-width="2" marker-end="url(#arr-lc)"/>

  <!-- Stage 1: Live -->
  <circle cx="120" cy="110" r="7" fill="#4C1D95"/>
  <rect x="40" y="40" width="160" height="54" rx="6" fill="#F5F3FF" stroke="#4C1D95" stroke-width="1.6"/>
  <text x="120" y="58" text-anchor="middle" font-size="10" fill="#4C1D95" letter-spacing="1.4" opacity="0.7">STAGE 1</text>
  <text x="120" y="80" text-anchor="middle" font-size="14" font-weight="700" fill="#4C1D95">Live · Trading</text>
  <text x="120" y="140" text-anchor="middle" font-size="12" fill="#4C1D95" opacity="0.75">Users buy and sell YES / NO</text>

  <!-- Stage 2: Deadline -->
  <circle cx="340" cy="110" r="7" fill="#4C1D95"/>
  <rect x="260" y="40" width="160" height="54" rx="6" fill="#F5F3FF" stroke="#4C1D95" stroke-width="1.6"/>
  <text x="340" y="58" text-anchor="middle" font-size="10" fill="#4C1D95" letter-spacing="1.4" opacity="0.7">STAGE 2</text>
  <text x="340" y="80" text-anchor="middle" font-size="14" font-weight="700" fill="#4C1D95">Deadline passes</text>
  <text x="340" y="140" text-anchor="middle" font-size="12" fill="#4C1D95" opacity="0.75">Book closes to new orders</text>

  <!-- Stage 3: Oracle -->
  <circle cx="560" cy="110" r="7" fill="#4C1D95"/>
  <rect x="480" y="126" width="160" height="54" rx="6" fill="#F5F3FF" stroke="#4C1D95" stroke-width="1.6"/>
  <text x="560" y="144" text-anchor="middle" font-size="10" fill="#4C1D95" letter-spacing="1.4" opacity="0.7">STAGE 3</text>
  <text x="560" y="166" text-anchor="middle" font-size="14" font-weight="700" fill="#4C1D95">Oracle reports</text>
  <text x="560" y="80" text-anchor="middle" font-size="12" fill="#4C1D95" opacity="0.75">Outcome data finalized</text>

  <!-- Stage 4: Resolved -->
  <circle cx="780" cy="110" r="7" fill="#4C1D95"/>
  <rect x="700" y="40" width="160" height="54" rx="6" fill="#DDD6FE" stroke="#4C1D95" stroke-width="1.8"/>
  <text x="780" y="58" text-anchor="middle" font-size="10" fill="#4C1D95" letter-spacing="1.4" opacity="0.7">STAGE 4</text>
  <text x="780" y="80" text-anchor="middle" font-size="14" font-weight="700" fill="#4C1D95">Resolved · Payouts</text>
  <text x="780" y="140" text-anchor="middle" font-size="12" fill="#4C1D95" opacity="0.75">Winners $1.00 · losers $0</text>
</svg>
