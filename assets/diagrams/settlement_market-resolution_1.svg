<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 220" width="880" style="max-width: 880px; background: transparent; font-family: -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;">
  <defs>
    <marker id="arr-lc" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#4C1D95"/>
    </marker>
  </defs>
  <style>
    .node  { fill: #F5F3FF; stroke: #4C1D95; stroke-width: 1.6; }
    .node-a{ fill: #DDD6FE; stroke: #4C1D95; stroke-width: 1.8; }
    .tb    { font-size: 14px; fill: #4C1D95; font-weight: 700; text-anchor: middle; }
    .t     { font-size: 12px; fill: #4C1D95; opacity: 0.75; text-anchor: middle; }
    .stage { font-size: 10px; fill: #4C1D95; text-anchor: middle; letter-spacing: 1.4px; opacity: 0.7; }
    .line  { stroke: #4C1D95; stroke-width: 2; fill: none; }
    .dot   { fill: #4C1D95; }
  </style>

  <!-- Timeline spine -->
  <line class="line" x1="60" y1="110" x2="820" y2="110" marker-end="url(#arr-lc)"/>

  <!-- Stage 1: Live -->
  <circle class="dot" cx="120" cy="110" r="7"/>
  <rect class="node" x="40" y="40" width="160" height="54" rx="6"/>
  <text class="stage" x="120" y="58">STAGE 1</text>
  <text class="tb"    x="120" y="80">Live · Trading</text>
  <text class="t"     x="120" y="140">Users buy &amp; sell YES / NO</text>

  <!-- Stage 2: Deadline -->
  <circle class="dot" cx="340" cy="110" r="7"/>
  <rect class="node" x="260" y="40" width="160" height="54" rx="6"/>
  <text class="stage" x="340" y="58">STAGE 2</text>
  <text class="tb"    x="340" y="80">Deadline passes</text>
  <text class="t"     x="340" y="140">Book closes to new orders</text>

  <!-- Stage 3: Oracle -->
  <circle class="dot" cx="560" cy="110" r="7"/>
  <rect class="node" x="480" y="126" width="160" height="54" rx="6"/>
  <text class="stage" x="560" y="144">STAGE 3</text>
  <text class="tb"    x="560" y="166">Oracle reports</text>
  <text class="t"     x="560" y="80">Outcome data finalized</text>

  <!-- Stage 4: Resolved (payout) -->
  <circle class="dot" cx="780" cy="110" r="7"/>
  <rect class="node-a" x="700" y="40" width="160" height="54" rx="6"/>
  <text class="stage" x="780" y="58">STAGE 4</text>
  <text class="tb"    x="780" y="80">Resolved · Payouts</text>
  <text class="t"     x="780" y="140">Winners receive $1.00 · losers $0</text>
</svg>
