<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 340" width="720" style="max-width: 720px; background: transparent; font-family: -apple-system, Segoe UI, Roboto, Helvetica Neue, Arial, sans-serif;">
  <rect data-bg="dark" x="0.0" y="0.0" width="720.0" height="340.0" fill="#1A1230" rx="8" ry="8"/>
  <defs>
    <marker id="arr-mo" viewBox="0 0 10 10" refX="9" refY="5" markerUnits="strokeWidth" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7C3AED"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="360" y="24" text-anchor="middle" font-size="14" font-weight="700" fill="#DDD6FE">Market order: buy 250 YES shares</text>

  <!-- Order book (left side) -->
  <text x="160" y="60" text-anchor="middle" font-size="12" font-weight="600" fill="#C4B5FD">Order book (asks)</text>

  <!-- Level 1: cheapest, eaten first -->
  <rect x="40" y="74" width="240" height="52" rx="6" fill="#2D2150" stroke="#7C3AED" stroke-width="1.2"/>
  <text x="80"  y="96" text-anchor="middle" font-size="16" font-weight="700" fill="#DDD6FE">62¢</text>
  <text x="190" y="96" text-anchor="middle" font-size="13" fill="#DDD6FE">100 shares</text>
  <text x="80"  y="116" text-anchor="middle" font-size="11" fill="#C4B5FD">cheapest</text>

  <!-- Level 2 -->
  <rect x="40" y="134" width="240" height="52" rx="6" fill="#2D2150" stroke="#7C3AED" stroke-width="1.2"/>
  <text x="80"  y="164" text-anchor="middle" font-size="16" font-weight="700" fill="#DDD6FE">63¢</text>
  <text x="190" y="164" text-anchor="middle" font-size="13" fill="#DDD6FE">100 shares</text>

  <!-- Level 3 -->
  <rect x="40" y="194" width="240" height="52" rx="6" fill="#2D2150" stroke="#7C3AED" stroke-width="1.2"/>
  <text x="80"  y="224" text-anchor="middle" font-size="16" font-weight="700" fill="#DDD6FE">64¢</text>
  <text x="190" y="224" text-anchor="middle" font-size="13" fill="#DDD6FE">150 shares</text>

  <!-- Your order (right side) -->
  <text x="540" y="60" text-anchor="middle" font-size="12" font-weight="600" fill="#C4B5FD">Your fills</text>

  <!-- Fill 1: all 100 @ 62¢ -->
  <rect x="420" y="74" width="260" height="52" rx="6" fill="#3D2A6A" stroke="#7C3AED" stroke-width="1.5"/>
  <text x="480" y="104" text-anchor="middle" font-size="14" font-weight="700" fill="#DDD6FE">100</text>
  <text x="540" y="104" text-anchor="middle" font-size="13" fill="#DDD6FE">shares @ 62¢</text>
  <text x="650" y="104" text-anchor="middle" font-size="13" font-weight="700" fill="#DDD6FE">= $62</text>

  <!-- Arrow 1 -->
  <line x1="282" y1="100" x2="418" y2="100" stroke="#7C3AED" stroke-width="1.5" marker-end="url(#arr-mo)"/>
  <text x="350" y="92" text-anchor="middle" font-size="11" fill="#C4B5FD">take all</text>

  <!-- Fill 2: all 100 @ 63¢ -->
  <rect x="420" y="134" width="260" height="52" rx="6" fill="#3D2A6A" stroke="#7C3AED" stroke-width="1.5"/>
  <text x="480" y="164" text-anchor="middle" font-size="14" font-weight="700" fill="#DDD6FE">100</text>
  <text x="540" y="164" text-anchor="middle" font-size="13" fill="#DDD6FE">shares @ 63¢</text>
  <text x="650" y="164" text-anchor="middle" font-size="13" font-weight="700" fill="#DDD6FE">= $63</text>

  <!-- Arrow 2 -->
  <line x1="282" y1="160" x2="418" y2="160" stroke="#7C3AED" stroke-width="1.5" marker-end="url(#arr-mo)"/>
  <text x="350" y="152" text-anchor="middle" font-size="11" fill="#C4B5FD">take all</text>

  <!-- Fill 3: partial 50 of 150 @ 64¢ -->
  <rect x="420" y="194" width="260" height="52" rx="6" fill="#3D2A6A" stroke="#7C3AED" stroke-width="1.2"/>
  <text x="480" y="224" text-anchor="middle" font-size="14" font-weight="700" fill="#DDD6FE">50</text>
  <text x="540" y="224" text-anchor="middle" font-size="13" fill="#DDD6FE">shares @ 64¢</text>
  <text x="650" y="224" text-anchor="middle" font-size="13" font-weight="700" fill="#DDD6FE">= $32</text>

  <!-- Arrow 3 -->
  <line x1="282" y1="220" x2="418" y2="220" stroke="#7C3AED" stroke-width="1.5" marker-end="url(#arr-mo)" stroke-dasharray="5 3"/>
  <text x="350" y="212" text-anchor="middle" font-size="11" fill="#C4B5FD">take 50</text>

  <!-- Remaining note -->
  <text x="160" y="268" text-anchor="middle" font-size="12" fill="#C4B5FD">100 shares still on the book @ 64¢</text>

  <!-- Summary bar -->
  <rect x="40" y="288" width="640" height="44" rx="6" fill="#3D2A6A" stroke="#7C3AED" stroke-width="1.5"/>
  <text x="130" y="316" text-anchor="middle" font-size="14" font-weight="700" fill="#DDD6FE">250 shares filled</text>
  <text x="330" y="316" text-anchor="middle" font-size="13" fill="#DDD6FE">Total cost $157</text>
  <text x="500" y="316" text-anchor="middle" font-size="13" fill="#DDD6FE">Avg price 62.8¢</text>
  <text x="640" y="316" text-anchor="middle" font-size="12" fill="#C4B5FD">slippage +0.8¢</text>
</svg>
