<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1020 140" width="1020" style="max-width: 1020px; background: transparent; font-family: -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;">
  <defs>
    <marker id="arr-ft" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#4C1D95"/>
    </marker>
  </defs>
  <style>
    .n  { fill: #F5F3FF; stroke: #4C1D95; stroke-width: 1.5; }
    .na { fill: #DDD6FE; stroke: #4C1D95; stroke-width: 1.8; }
    .num{ font-size: 11px; fill: #4C1D95; text-anchor: middle; opacity: 0.75; letter-spacing: 1px; }
    .tb { font-size: 13px; fill: #4C1D95; text-anchor: middle; font-weight: 700; }
    .f  { stroke: #4C1D95; stroke-width: 1.8; fill: none; }
  </style>

  <g><rect class="n"  x="20"  y="40" width="170" height="60" rx="6"/>
     <text class="num" x="105" y="62">STEP 1</text>
     <text class="tb"  x="105" y="84">Sign in</text></g>
  <line class="f" x1="192" y1="70" x2="218" y2="70" marker-end="url(#arr-ft)"/>

  <g><rect class="n"  x="220" y="40" width="170" height="60" rx="6"/>
     <text class="num" x="305" y="62">STEP 2</text>
     <text class="tb"  x="305" y="84">Deposit USDC</text></g>
  <line class="f" x1="392" y1="70" x2="418" y2="70" marker-end="url(#arr-ft)"/>

  <g><rect class="n"  x="420" y="40" width="170" height="60" rx="6"/>
     <text class="num" x="505" y="62">STEP 3</text>
     <text class="tb"  x="505" y="84">Pick a market</text></g>
  <line class="f" x1="592" y1="70" x2="618" y2="70" marker-end="url(#arr-ft)"/>

  <g><rect class="n"  x="620" y="40" width="170" height="60" rx="6"/>
     <text class="num" x="705" y="62">STEP 4</text>
     <text class="tb"  x="705" y="84">Buy YES or NO</text></g>
  <line class="f" x1="792" y1="70" x2="818" y2="70" marker-end="url(#arr-ft)"/>

  <g><rect class="na" x="820" y="40" width="180" height="60" rx="6"/>
     <text class="num" x="910" y="62">STEP 5</text>
     <text class="tb"  x="910" y="84">Track or sell</text></g>
</svg>
