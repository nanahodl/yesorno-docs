<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 210" width="820" style="max-width: 820px; background: transparent; font-family: -apple-system, Segoe UI, Roboto, Helvetica Neue, Arial, sans-serif;">
  <defs>
    <linearGradient id="prob-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#EDE9FE"/>
      <stop offset="35%"  stop-color="#C4B5FD"/>
      <stop offset="65%"  stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#4C1D95"/>
    </linearGradient>
  </defs>

  <!-- Gradient bar (thicker) -->
  <rect x="50" y="28" width="720" height="42" rx="21" fill="url(#prob-grad)" stroke="#4C1D95" stroke-width="1"/>

  <!-- Direction text inside bar -->
  <text x="78"  y="54" text-anchor="start" font-size="13" font-weight="700" fill="#4C1D95" opacity="0.6">Less likely</text>
  <text x="742" y="54" text-anchor="end"   font-size="13" font-weight="700" fill="#FFFFFF" opacity="0.9">More likely</text>

  <!-- Dots on the bar at each tick -->
  <circle cx="50"  cy="49" r="5" fill="white" stroke="#4C1D95" stroke-width="1.2"/>
  <circle cx="230" cy="49" r="5" fill="white" stroke="#4C1D95" stroke-width="1.2"/>
  <circle cx="410" cy="49" r="5" fill="white" stroke="#7C3AED" stroke-width="1.2"/>
  <circle cx="590" cy="49" r="5" fill="white" stroke="#7C3AED" stroke-width="1.2"/>
  <circle cx="770" cy="49" r="5" fill="white" stroke="#4C1D95" stroke-width="1.2"/>

  <!-- Connector lines from dots to labels -->
  <line x1="50"  y1="54" x2="50"  y2="78" stroke="#4C1D95" stroke-width="1" opacity="0.3"/>
  <line x1="230" y1="54" x2="230" y2="78" stroke="#4C1D95" stroke-width="1" opacity="0.3"/>
  <line x1="410" y1="54" x2="410" y2="78" stroke="#4C1D95" stroke-width="1" opacity="0.3"/>
  <line x1="590" y1="54" x2="590" y2="78" stroke="#4C1D95" stroke-width="1" opacity="0.3"/>
  <line x1="770" y1="54" x2="770" y2="78" stroke="#4C1D95" stroke-width="1" opacity="0.3"/>

  <!-- Label cards -->
  <!-- 1¢ -->
  <rect x="10"  y="80" width="80" height="72" rx="6" fill="#F5F3FF" stroke="#4C1D95" stroke-width="0.8" opacity="0.6"/>
  <text x="50"  y="100" text-anchor="middle" font-size="16" font-weight="700" fill="#4C1D95">1¢</text>
  <text x="50"  y="118" text-anchor="middle" font-size="11" fill="#4C1D95" opacity="0.6">~1%</text>
  <text x="50"  y="136" text-anchor="middle" font-size="10" fill="#4C1D95" opacity="0.5">Almost</text>
  <text x="50"  y="148" text-anchor="middle" font-size="10" fill="#4C1D95" opacity="0.5">impossible</text>

  <!-- 25¢ -->
  <rect x="190" y="80" width="80" height="72" rx="6" fill="#F5F3FF" stroke="#4C1D95" stroke-width="0.8" opacity="0.6"/>
  <text x="230" y="100" text-anchor="middle" font-size="16" font-weight="700" fill="#4C1D95">25¢</text>
  <text x="230" y="118" text-anchor="middle" font-size="11" fill="#4C1D95" opacity="0.6">~25%</text>
  <text x="230" y="140" text-anchor="middle" font-size="10" fill="#4C1D95" opacity="0.5">Unlikely</text>

  <!-- 50¢ -->
  <rect x="370" y="80" width="80" height="72" rx="6" fill="#EDE9FE" stroke="#4C1D95" stroke-width="1" opacity="0.7"/>
  <text x="410" y="100" text-anchor="middle" font-size="16" font-weight="700" fill="#4C1D95">50¢</text>
  <text x="410" y="118" text-anchor="middle" font-size="11" fill="#4C1D95" opacity="0.6">~50%</text>
  <text x="410" y="140" text-anchor="middle" font-size="10" fill="#4C1D95" opacity="0.5">Coin flip</text>

  <!-- 75¢ -->
  <rect x="550" y="80" width="80" height="72" rx="6" fill="#F5F3FF" stroke="#4C1D95" stroke-width="0.8" opacity="0.6"/>
  <text x="590" y="100" text-anchor="middle" font-size="16" font-weight="700" fill="#4C1D95">75¢</text>
  <text x="590" y="118" text-anchor="middle" font-size="11" fill="#4C1D95" opacity="0.6">~75%</text>
  <text x="590" y="140" text-anchor="middle" font-size="10" fill="#4C1D95" opacity="0.5">Likely</text>

  <!-- 99¢ -->
  <rect x="730" y="80" width="80" height="72" rx="6" fill="#F5F3FF" stroke="#4C1D95" stroke-width="0.8" opacity="0.6"/>
  <text x="770" y="100" text-anchor="middle" font-size="16" font-weight="700" fill="#4C1D95">99¢</text>
  <text x="770" y="118" text-anchor="middle" font-size="11" fill="#4C1D95" opacity="0.6">~99%</text>
  <text x="770" y="136" text-anchor="middle" font-size="10" fill="#4C1D95" opacity="0.5">Almost</text>
  <text x="770" y="148" text-anchor="middle" font-size="10" fill="#4C1D95" opacity="0.5">certain</text>

  <!-- Bottom caption -->
  <text x="410" y="190" text-anchor="middle" font-size="13" fill="#4C1D95" opacity="0.55">Share price = the market's implied probability</text>
</svg>
