<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 170" width="820" style="max-width: 820px; background: transparent; font-family: -apple-system, Segoe UI, Roboto, Helvetica Neue, Arial, sans-serif;">
  <defs>
    <linearGradient id="prob-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#F5F3FF"/>
      <stop offset="50%"  stop-color="#C4B5FD"/>
      <stop offset="100%" stop-color="#4C1D95"/>
    </linearGradient>
  </defs>

  <!-- Gradient bar -->
  <rect x="50" y="20" width="720" height="30" rx="15" fill="url(#prob-grad)" stroke="#4C1D95" stroke-width="1.2"/>

  <!-- Direction labels on the bar itself -->
  <text x="80"  y="40" text-anchor="start" font-size="11" font-weight="600" fill="#4C1D95" opacity="0.85">Less likely</text>
  <text x="740" y="40" text-anchor="end"   font-size="11" font-weight="600" fill="white"   opacity="0.95">More likely</text>

  <!-- Tick marks -->
  <line x1="50"  y1="50" x2="50"  y2="62" stroke="#4C1D95" stroke-width="1.5"/>
  <line x1="230" y1="50" x2="230" y2="62" stroke="#4C1D95" stroke-width="1.5"/>
  <line x1="410" y1="50" x2="410" y2="62" stroke="#4C1D95" stroke-width="1.5"/>
  <line x1="590" y1="50" x2="590" y2="62" stroke="#4C1D95" stroke-width="1.5"/>
  <line x1="770" y1="50" x2="770" y2="62" stroke="#4C1D95" stroke-width="1.5"/>

  <!-- Price labels -->
  <text x="50"  y="80" text-anchor="middle" font-size="15" font-weight="700" fill="#4C1D95">1¢</text>
  <text x="230" y="80" text-anchor="middle" font-size="15" font-weight="700" fill="#4C1D95">25¢</text>
  <text x="410" y="80" text-anchor="middle" font-size="15" font-weight="700" fill="#4C1D95">50¢</text>
  <text x="590" y="80" text-anchor="middle" font-size="15" font-weight="700" fill="#4C1D95">75¢</text>
  <text x="770" y="80" text-anchor="middle" font-size="15" font-weight="700" fill="#4C1D95">99¢</text>

  <!-- Probability labels -->
  <text x="50"  y="98" text-anchor="middle" font-size="11" fill="#4C1D95" opacity="0.65">~1%</text>
  <text x="230" y="98" text-anchor="middle" font-size="11" fill="#4C1D95" opacity="0.65">~25%</text>
  <text x="410" y="98" text-anchor="middle" font-size="11" fill="#4C1D95" opacity="0.65">~50%</text>
  <text x="590" y="98" text-anchor="middle" font-size="11" fill="#4C1D95" opacity="0.65">~75%</text>
  <text x="770" y="98" text-anchor="middle" font-size="11" fill="#4C1D95" opacity="0.65">~99%</text>

  <!-- Meaning labels -->
  <text x="50"  y="116" text-anchor="middle" font-size="11" fill="#4C1D95" opacity="0.5">Almost</text>
  <text x="50"  y="129" text-anchor="middle" font-size="11" fill="#4C1D95" opacity="0.5">impossible</text>
  <text x="230" y="122" text-anchor="middle" font-size="11" fill="#4C1D95" opacity="0.5">Unlikely</text>
  <text x="410" y="122" text-anchor="middle" font-size="11" fill="#4C1D95" opacity="0.5">Coin flip</text>
  <text x="590" y="122" text-anchor="middle" font-size="11" fill="#4C1D95" opacity="0.5">Likely</text>
  <text x="770" y="116" text-anchor="middle" font-size="11" fill="#4C1D95" opacity="0.5">Almost</text>
  <text x="770" y="129" text-anchor="middle" font-size="11" fill="#4C1D95" opacity="0.5">certain</text>

  <!-- Caption -->
  <text x="410" y="160" text-anchor="middle" font-size="12" fill="#4C1D95" opacity="0.6">Share price = the market's implied probability</text>
</svg>
