<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 180" width="860" style="max-width: 860px; background: transparent; font-family: -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;">
  <defs>
    <linearGradient id="price-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"  stop-color="#F5F3FF"/>
      <stop offset="50%" stop-color="#DDD6FE"/>
      <stop offset="100%" stop-color="#4C1D95"/>
    </linearGradient>
    <marker id="arr-ax" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#4C1D95"/>
    </marker>
  </defs>

  <!-- Gradient bar -->
  <rect x="40" y="58" width="780" height="32" rx="16" ry="16"
        fill="url(#price-grad)" stroke="#4C1D95" stroke-width="1.5"/>

  <!-- Tick marks -->
  <g stroke="#4C1D95" stroke-width="1.5">
    <line x1="60"  y1="90" x2="60"  y2="100"/>
    <line x1="240" y1="90" x2="240" y2="100"/>
    <line x1="430" y1="90" x2="430" y2="100"/>
    <line x1="620" y1="90" x2="620" y2="100"/>
    <line x1="800" y1="90" x2="800" y2="100"/>
  </g>

  <!-- Price labels -->
  <g fill="#4C1D95" font-size="15" font-weight="700" text-anchor="middle">
    <text x="60"  y="120">1¢</text>
    <text x="240" y="120">25¢</text>
    <text x="430" y="120">50¢</text>
    <text x="620" y="120">75¢</text>
    <text x="800" y="120">99¢</text>
  </g>

  <!-- Secondary labels -->
  <g fill="#4C1D95" font-size="12" opacity="0.75" text-anchor="middle">
    <text x="60"  y="140">Almost impossible</text>
    <text x="240" y="140">Unlikely</text>
    <text x="430" y="140">Coin flip</text>
    <text x="620" y="140">Likely</text>
    <text x="800" y="140">Almost certain</text>
  </g>

  <!-- Top hints -->
  <g fill="#4C1D95" font-size="13" font-weight="600">
    <text x="40"  y="38" text-anchor="start">Less likely →</text>
    <text x="820" y="38" text-anchor="end">← More likely</text>
  </g>
  <line x1="135" y1="32" x2="180" y2="32" stroke="#4C1D95" stroke-width="1.5" marker-end="url(#arr-ax)" opacity="0.6"/>
  <line x1="725" y1="32" x2="680" y2="32" stroke="#4C1D95" stroke-width="1.5" marker-end="url(#arr-ax)" opacity="0.6"/>

  <!-- Bottom caption -->
  <text x="430" y="168" text-anchor="middle" font-size="12" fill="#4C1D95" opacity="0.75">
    YES price = market's implied probability the event happens
  </text>
</svg>
