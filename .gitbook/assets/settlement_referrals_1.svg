<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 220" width="820" style="max-width: 820px; background: transparent; font-family: -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;">
  <rect data-bg="white" x="0" y="0" width="820" height="220" fill="#FFFFFF" rx="8" ry="8"/>

  <defs>
    <marker id="arr-ref" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7C3AED"/>
    </marker>
  </defs>

  <!-- ===== YOU ===== -->
  <rect x="40" y="70" width="170" height="80" rx="10" ry="10"
        fill="#4C1D95" stroke="#4C1D95" stroke-width="1.5"/>
  <text x="125" y="100" text-anchor="middle" font-size="13" fill="#C4B5FD" font-weight="500">YOU</text>
  <text x="125" y="125" text-anchor="middle" font-size="16" fill="#FFFFFF" font-weight="700">Earn rewards</text>

  <!-- Arrow YOU -> Direct -->
  <path d="M 215 110 L 318 110" fill="none" stroke="#7C3AED" stroke-width="2" marker-end="url(#arr-ref)"/>

  <!-- 30% badge above arrow -->
  <rect x="232" y="78" width="76" height="26" rx="13" fill="#EDE9FE" stroke="#7C3AED" stroke-width="1.2"/>
  <text x="270" y="96" text-anchor="middle" font-size="13" fill="#4C1D95" font-weight="700">30%</text>

  <!-- Sub-label below arrow -->
  <text x="270" y="132" text-anchor="middle" font-size="11" fill="#7C3AED" font-weight="500">of their fees</text>

  <!-- ===== Direct (L1) ===== -->
  <rect x="325" y="70" width="170" height="80" rx="10" ry="10"
        fill="#F5F3FF" stroke="#7C3AED" stroke-width="1.5"/>
  <text x="410" y="100" text-anchor="middle" font-size="13" fill="#7C3AED" font-weight="600">Direct (L1)</text>
  <text x="410" y="125" text-anchor="middle" font-size="16" fill="#4C1D95" font-weight="700">Friend you invite</text>

  <!-- Arrow Direct -> Indirect -->
  <path d="M 500 110 L 603 110" fill="none" stroke="#A78BFA" stroke-width="2" marker-end="url(#arr-ref)"/>

  <!-- 10% badge -->
  <rect x="525" y="78" width="76" height="26" rx="13" fill="#FFFFFF" stroke="#A78BFA" stroke-width="1.2"/>
  <text x="563" y="96" text-anchor="middle" font-size="13" fill="#5B21B6" font-weight="700">10%</text>

  <text x="563" y="132" text-anchor="middle" font-size="11" fill="#7C3AED" font-weight="500">of their fees</text>

  <!-- ===== Indirect (L2) ===== -->
  <rect x="610" y="70" width="170" height="80" rx="10" ry="10"
        fill="#FFFFFF" stroke="#A78BFA" stroke-width="1.5"/>
  <text x="695" y="100" text-anchor="middle" font-size="13" fill="#7C3AED" font-weight="600">Indirect (L2)</text>
  <text x="695" y="125" text-anchor="middle" font-size="16" fill="#5B21B6" font-weight="700">Their friend</text>

  <!-- ===== Caption ===== -->
  <text x="410" y="195" text-anchor="middle" font-size="13" fill="#5B21B6" font-weight="500">Up to two levels deep, automatically settled in USDC.</text>
</svg>
