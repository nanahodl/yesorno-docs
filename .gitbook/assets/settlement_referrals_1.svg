<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 380" width="820" style="max-width: 820px; background: transparent; font-family: -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;">
  <rect data-bg="white" x="0" y="0" width="820" height="380" fill="#FAFAFB" rx="12" ry="12"/>

  <defs>
    <linearGradient id="youGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"  stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#4C1D95"/>
    </linearGradient>
    <linearGradient id="l1Grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"  stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F5F3FF"/>
    </linearGradient>
  </defs>

  <!-- ===== Connector lines (vertical chain on the LEFT, drawn first) ===== -->
  <!-- YOU -> Alice -->
  <line x1="240" y1="116" x2="240" y2="194" stroke="#7C3AED" stroke-width="2.5"/>
  <!-- Alice -> Carol -->
  <line x1="240" y1="272" x2="240" y2="313" stroke="#A78BFA" stroke-width="2" stroke-dasharray="5 4"/>

  <!-- ===== 30% reward badge (right of YOU->Alice line) ===== -->
  <rect x="262" y="138" width="78" height="32" rx="16" fill="#4C1D95"/>
  <text x="301" y="159" text-anchor="middle" font-size="15" fill="#FFFFFF" font-weight="700">+30%</text>
  <text x="301" y="186" text-anchor="middle" font-size="11" fill="#5B21B6" font-weight="500">of Alice's fees</text>

  <!-- ===== 10% reward badge (right of Alice->Carol line) ===== -->
  <rect x="262" y="278" width="78" height="28" rx="14" fill="#FFFFFF" stroke="#7C3AED" stroke-width="1.5"/>
  <text x="301" y="297" text-anchor="middle" font-size="13" fill="#5B21B6" font-weight="700">+10%</text>
  <text x="301" y="322" text-anchor="middle" font-size="11" fill="#5B21B6" font-weight="500">of Carol's fees</text>

  <!-- ===== Side narrative on the RIGHT (storytelling) ===== -->
  <text x="430" y="80" font-size="14" fill="#4C1D95" font-weight="700">You invite Alice.</text>
  <text x="430" y="102" font-size="13" fill="#5B21B6" font-weight="500">Every time she trades, you earn</text>
  <text x="430" y="122" font-size="13" fill="#5B21B6" font-weight="500">30% of the fees she pays.</text>

  <text x="430" y="226" font-size="14" fill="#4C1D95" font-weight="700">Alice invites Carol.</text>
  <text x="430" y="248" font-size="13" fill="#5B21B6" font-weight="500">Every time Carol trades, you earn</text>
  <text x="430" y="268" font-size="13" fill="#5B21B6" font-weight="500">10% of the fees she pays.</text>

  <!-- ===== YOU node ===== -->
  <circle cx="240" cy="68" r="48" fill="url(#youGrad)"/>
  <text x="240" y="62" text-anchor="middle" font-size="11" fill="#C4B5FD" font-weight="500">YOU</text>
  <text x="240" y="84" text-anchor="middle" font-size="15" fill="#FFFFFF" font-weight="700">earn</text>

  <!-- Sparkles around YOU -->
  <circle cx="190" cy="42" r="4" fill="#A78BFA"/>
  <circle cx="296" cy="50" r="3" fill="#C4B5FD"/>
  <circle cx="304" cy="92" r="3" fill="#A78BFA"/>

  <!-- ===== L1: Alice ===== -->
  <circle cx="240" cy="232" r="40" fill="url(#l1Grad)" stroke="#7C3AED" stroke-width="2"/>
  <text x="240" y="226" text-anchor="middle" font-size="10" fill="#7C3AED" font-weight="600">DIRECT (L1)</text>
  <text x="240" y="246" text-anchor="middle" font-size="14" fill="#4C1D95" font-weight="700">Alice</text>

  <!-- ===== L2: Carol ===== -->
  <circle cx="240" cy="345" r="32" fill="#FFFFFF" stroke="#A78BFA" stroke-width="1.5"/>
  <text x="240" y="340" text-anchor="middle" font-size="9" fill="#7C3AED" font-weight="600">INDIRECT (L2)</text>
  <text x="240" y="356" text-anchor="middle" font-size="12" fill="#5B21B6" font-weight="700">Carol</text>
</svg>
