<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1060 220" width="1060" style="max-width: 1060px; background: transparent; font-family: -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;">
  <rect data-bg="dark" x="0" y="0" width="1060" height="220" fill="#1A1230" rx="8" ry="8"/>

  <defs>
    <linearGradient id="lcRail" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#3D2A6A"/>
      <stop offset="50%"  stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#DDD6FE"/>
    </linearGradient>
    <marker id="arr-lc" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#A78BFA"/>
    </marker>
  </defs>

  <!-- ===== Time rail ===== -->
  <text x="40"   y="32" font-size="10" font-weight="700" fill="#C4B5FD" letter-spacing="1.2">BEFORE DEADLINE</text>
  <text x="1020" y="32" text-anchor="end" font-size="10" font-weight="700" fill="#DDD6FE" letter-spacing="1.2">AFTER RESOLUTION</text>
  <rect x="40" y="42" width="980" height="4" rx="2" fill="url(#lcRail)"/>

  <!-- ===== Stage 1: Live Trading (x: 40..270) ===== -->
  <rect x="40" y="74" width="230" height="120" rx="12" fill="#2D2150" stroke="#A78BFA" stroke-width="1.5"/>
  <circle cx="64" cy="70" r="15" fill="#4C1D95" stroke="#A78BFA" stroke-width="1.5"/>
  <text x="64" y="75" text-anchor="middle" font-size="13" font-weight="700" fill="#FFFFFF">1</text>
  <text x="62" y="115" font-size="15" font-weight="700" fill="#DDD6FE">Live Trading</text>
  <text x="62" y="143" font-size="12" fill="#C4B5FD">Buy and sell YES / NO shares</text>
  <rect x="62" y="158" width="58" height="20" rx="10" fill="#1A1230" stroke="#7C3AED" stroke-width="1"/>
  <text x="91" y="172" text-anchor="middle" font-size="10.5" font-weight="600" fill="#C4B5FD">Open</text>

  <line x1="272" y1="134" x2="298" y2="134" stroke="#A78BFA" stroke-width="2" marker-end="url(#arr-lc)"/>

  <!-- ===== Stage 2: Market Closes (x: 302..532) ===== -->
  <rect x="302" y="74" width="230" height="120" rx="12" fill="#2D2150" stroke="#A78BFA" stroke-width="1.5"/>
  <circle cx="326" cy="70" r="15" fill="#4C1D95" stroke="#A78BFA" stroke-width="1.5"/>
  <text x="326" y="75" text-anchor="middle" font-size="13" font-weight="700" fill="#FFFFFF">2</text>
  <text x="324" y="115" font-size="15" font-weight="700" fill="#DDD6FE">Market Closes</text>
  <text x="324" y="143" font-size="12" fill="#C4B5FD">Trading stops at the deadline</text>
  <rect x="324" y="158" width="124" height="20" rx="10" fill="#1A1230" stroke="#7C3AED" stroke-width="1"/>
  <text x="386" y="172" text-anchor="middle" font-size="10.5" font-weight="600" fill="#C4B5FD">Open orders cancelled</text>

  <line x1="534" y1="134" x2="560" y2="134" stroke="#A78BFA" stroke-width="2" marker-end="url(#arr-lc)"/>

  <!-- ===== Stage 3: Outcome Confirmed (x: 564..794) ===== -->
  <rect x="564" y="74" width="230" height="120" rx="12" fill="#2D2150" stroke="#A78BFA" stroke-width="1.5"/>
  <circle cx="588" cy="70" r="15" fill="#4C1D95" stroke="#A78BFA" stroke-width="1.5"/>
  <text x="588" y="75" text-anchor="middle" font-size="13" font-weight="700" fill="#FFFFFF">3</text>
  <text x="586" y="115" font-size="15" font-weight="700" fill="#DDD6FE">Outcome Confirmed</text>
  <text x="586" y="143" font-size="12" fill="#C4B5FD">Oracle posts the official result</text>
  <rect x="586" y="158" width="106" height="20" rx="10" fill="#1A1230" stroke="#7C3AED" stroke-width="1"/>
  <text x="639" y="172" text-anchor="middle" font-size="10.5" font-weight="600" fill="#C4B5FD">Auto · 24–72h</text>

  <line x1="796" y1="134" x2="822" y2="134" stroke="#A78BFA" stroke-width="2" marker-end="url(#arr-lc)"/>

  <!-- ===== Stage 4: Payouts (deep purple endpoint, x: 826..1020) ===== -->
  <rect x="826" y="74" width="194" height="120" rx="12" fill="#7C3AED" stroke="#7C3AED" stroke-width="1.5"/>
  <circle cx="850" cy="70" r="15" fill="#FFFFFF" stroke="#A78BFA" stroke-width="2"/>
  <text x="850" y="75" text-anchor="middle" font-size="13" font-weight="700" fill="#4C1D95">4</text>
  <text x="848" y="115" font-size="15" font-weight="700" fill="#FFFFFF">Payouts</text>
  <text x="848" y="143" font-size="12" fill="#DDD6FE">Winners get $1.00 each</text>
  <rect x="848" y="158" width="84" height="20" rx="10" fill="#FFFFFF" stroke="#FFFFFF" stroke-width="1"/>
  <text x="890" y="172" text-anchor="middle" font-size="10.5" font-weight="600" fill="#7C3AED">Auto-settled</text>
</svg>
