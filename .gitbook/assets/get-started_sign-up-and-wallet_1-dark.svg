<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 260" width="1000" style="max-width: 1000px; background: transparent; font-family: -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;">
  <rect data-bg="dark" x="0" y="0" width="1000" height="260" fill="#1A1230" rx="8" ry="8"/>
  <defs>
    <marker id="arr-su" viewBox="0 0 10 10" refX="9" refY="5" markerUnits="strokeWidth" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7C3AED"/>
    </marker>
  </defs>

  <!-- ===== Step 1: Modal ===== -->
  <rect x="20" y="100" width="170" height="60" rx="6" fill="#2D2150" stroke="#7C3AED" stroke-width="1.5"/>
  <text x="105" y="125" text-anchor="middle" font-size="13" font-weight="700" fill="#DDD6FE">Log In /</text>
  <text x="105" y="143" text-anchor="middle" font-size="13" font-weight="700" fill="#DDD6FE">Sign Up modal</text>

  <line x1="192" y1="130" x2="248" y2="130" stroke="#7C3AED" stroke-width="1.8" marker-end="url(#arr-su)"/>

  <!-- ===== Step 2: Choose method (diamond) ===== -->
  <polygon points="250,130 320,80 390,130 320,180" fill="#3D2A6A" stroke="#7C3AED" stroke-width="1.8"/>
  <text x="320" y="127" text-anchor="middle" font-size="13" font-weight="700" fill="#DDD6FE">Choose</text>
  <text x="320" y="144" text-anchor="middle" font-size="13" font-weight="700" fill="#DDD6FE">method</text>

  <!-- Diamond -> wallet (top) -->
  <path d="M 355 102 C 395 80, 410 54, 428 54" fill="none" stroke="#7C3AED" stroke-width="1.8" marker-end="url(#arr-su)"/>
  <!-- Diamond -> email (bottom) -->
  <path d="M 355 158 C 395 180, 410 206, 428 206" fill="none" stroke="#7C3AED" stroke-width="1.8" marker-end="url(#arr-su)"/>

  <!-- ===== Top branch: Connect wallet ===== -->
  <rect x="430" y="14" width="220" height="80" rx="6" fill="#2D2150" stroke="#7C3AED" stroke-width="1.5"/>
  <text x="540" y="38" text-anchor="middle" font-size="13" font-weight="700" fill="#DDD6FE">Connect wallet</text>
  <text x="540" y="60" text-anchor="middle" font-size="12" fill="#C4B5FD">MetaMask · Coinbase Wallet</text>
  <text x="540" y="80" text-anchor="middle" font-size="12" fill="#C4B5FD">Phantom · Uniswap</text>

  <line x1="652" y1="54" x2="708" y2="54" stroke="#7C3AED" stroke-width="1.8" marker-end="url(#arr-su)"/>

  <rect x="710" y="32" width="160" height="44" rx="6" fill="#2D2150" stroke="#7C3AED" stroke-width="1.5"/>
  <text x="790" y="59" text-anchor="middle" font-size="13" font-weight="700" fill="#DDD6FE">Sign to connect</text>

  <!-- ===== Bottom branch: Email ===== -->
  <rect x="430" y="172" width="220" height="68" rx="6" fill="#2D2150" stroke="#7C3AED" stroke-width="1.5"/>
  <text x="540" y="198" text-anchor="middle" font-size="13" font-weight="700" fill="#DDD6FE">Email + Privy</text>
  <text x="540" y="220" text-anchor="middle" font-size="12" fill="#C4B5FD">embedded wallet</text>

  <line x1="652" y1="206" x2="708" y2="206" stroke="#7C3AED" stroke-width="1.8" marker-end="url(#arr-su)"/>

  <rect x="710" y="184" width="160" height="44" rx="6" fill="#2D2150" stroke="#7C3AED" stroke-width="1.5"/>
  <text x="790" y="211" text-anchor="middle" font-size="13" font-weight="700" fill="#DDD6FE">Email OTP</text>

  <!-- ===== Branches converge to Account ready ===== -->
  <path d="M 872 54 C 895 54, 900 100, 916 122" fill="none" stroke="#7C3AED" stroke-width="1.8" marker-end="url(#arr-su)"/>
  <path d="M 872 206 C 895 206, 900 160, 916 138" fill="none" stroke="#7C3AED" stroke-width="1.8" marker-end="url(#arr-su)"/>

  <!-- ===== Final: Account ready ===== -->
  <rect x="920" y="108" width="60" height="44" rx="6" fill="#7C3AED" stroke="#7C3AED" stroke-width="1.8"/>
  <text x="950" y="129" text-anchor="middle" font-size="10" fill="#DDD6FE" font-weight="500">ACCOUNT</text>
  <text x="950" y="145" text-anchor="middle" font-size="11" fill="#FFFFFF" font-weight="700">Ready</text>
</svg>
